<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Index AOS</title>
<meta content="width=device-width, initial-scale=1.0, user-scalable=yes" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js">
if (sessionStorage.getItem('returnToRest')) {
  const target = document.querySelector('.section-rest .image-button');
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    sessionStorage.removeItem('returnToRest');
  }
}

</script>
<style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #222;
      font-family: sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
  height: auto;
    }
    header {
      height: 60px;
      background-color: #222;
      padding: 0 1%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }
    button {
      padding: 0.8em 0.8em;
      background-color: #ccc;
      border: none;
      border-radius: 0.4em;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9em;
      white-space: nowrap;
    }
    button:hover {
      background-color: #eee;
    }
    .drag-toggle.active {
      background-color: #88c;
      color: white;
    }
    .dropdown-panel {
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #333;
      color: white;
      border: 1px solid #555;
      padding: 1em;
      border-radius: 0.4em;
      display: none;
      flex-direction: column;
      gap: 0.5em;
      max-height: 300px;
      overflow-y: auto;
      z-index: 1001;
      white-space: nowrap;
      min-width: max-content;
    }
    .dropdown-panel label {
      display: flex;
      align-items: center;
      font-size: 0.9em;
    }
    .dropdown-panel input {
      margin-right: 0.5em;
    }
    .section-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5%;
      padding: 1.5%;
    }
    .top-card-slot {
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }
    .top-card-slot img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      cursor: pointer;
    }
    .separator {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2vh;
      font-family: 'Roboto', sans-serif;
      font-size: 1.2em;
      color: #ccc;
      border-top: 1px solid #444;
      border-bottom: 1px solid #444;
      background-color: #222;
      margin: 0;
    }
    .section-rest {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5%;
      padding: 1.5%;
    }
    .image-button {
      width: 100%;
      aspect-ratio: 1200 / 1667;
      overflow: hidden;
      transition: transform 0.2s ease;
      touch-action: auto;
    }
    .image-button:hover {
      transform: scale(1.03);
    }
    .image-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 0.6em;
    }
    #popup-overlay {
      display: none;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }
    .popup-content {
      background: #222;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      border-radius: 0.5em;
    }
    .popup-content img {
      width: 30vw;
      max-width: 100%;
      height: auto;
      cursor: pointer;
    }
  
.inactive-card {
  opacity: 0.3;
  filter: grayscale(100%);
}
.hidden-card {
  display: none !important;
}
</style>
</head>
<body>
<header>
<div class="header-left"><div style="position: relative;"><button id="compositionToggle">Composition</button></div>

<div style="position: relative;">
<button onclick="toggleDropdown('spellDropdown')">Spell Lore</button>
<div class="dropdown-panel" id="spellDropdown">
<label><input data-img="icons/celestial.png" data-key="spell-Celestial" name="spell" type="radio"/>Celestial Manipulation</label>
<label><input data-img="icons/primal.png" data-key="spell-Primal" name="spell" type="radio"/>Primal Jungles</label>
</div>
</div>
</div>
<div class="header-right">
<button class="drag-toggle" id="dragToggleBtn" onclick="toggleDrag()">Déverrouiller</button>
<button class="reset-all" onclick="resetAllData()">Reset Notes</button>
</div>
</header>
<div class="section-top">
<div class="top-card-slot" id="battle-slot-T1">
<img alt="Battle Trait T1" onclick="openPopup('T1')" src="icons/battle-trait-T1.png"/>
</div>
<div class="top-card-slot" id="battle-slot-T3">
<img alt="Battle Trait T3" onclick="openPopup('T3')" src="icons/battle-trait-T3.png"/>
</div>
<div class="top-card-slot">
<img alt="Command Orders" onclick="location.href='commands.html'" src="icons/command-orders.png"/>
</div>
<div class="top-card-slot" id="slot-battle"><img alt="Battle Formation" onclick="openPopup('battle')" src="icons/eternalstar.png"/></div>
<div class="top-card-slot" id="slot-artefact"><img alt="Artefact" onclick="openPopup('artefact')" src="icons/artefact1.png"/></div>
<div class="top-card-slot" id="slot-trait"><img alt="Trait" onclick="openPopup('trait')" src="icons/beastmaster.png"/></div>
<div class="top-card-slot" id="slot-spell-1"></div>
<div class="top-card-slot" id="slot-spell-2"></div>
<div class="top-card-slot" id="slot-spell-3"></div>
</div>
<div class="separator">Armée</div>
<div class="section-rest" id="cardContainer"></div>
<div id="popup-overlay">
<div class="popup-content" style="background: #222; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-radius: 0.5em;"><div id="popup-t1t3" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 20px;"><img onclick="selectTrait('1')" src="icons/battle-trait-1.png"/><img onclick="selectTrait('2')" src="icons/battle-trait-2.png"/><img onclick="selectTrait('3')" src="icons/battle-trait-3.png"/><img onclick="selectTrait('4')" src="icons/battle-trait-4.png"/></div><div id="popup-battle" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 20px;"><img onclick="selectGeneric('battle', 'eternalstar')" src="icons/eternalstar.png"/><img onclick="selectGeneric('battle', 'shadowstrike')" src="icons/shadowstrike.png"/><img onclick="selectGeneric('battle', 'sunclaw')" src="icons/sunclaw.png"/><img onclick="selectGeneric('battle', 'thunderquake')" src="icons/thunderquake.png"/></div><div id="popup-artefact" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 20px;"><img onclick="selectGeneric('artefact', 'artefact1')" src="icons/artefact1.png"/><img onclick="selectGeneric('artefact', 'artefact2')" src="icons/artefact2.png"/><img onclick="selectGeneric('artefact', 'artefact3')" src="icons/artefact3.png"/></div><div id="popup-trait" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 20px;"><img onclick="selectGeneric('trait', 'beastmaster')" src="icons/beastmaster.png"/><img onclick="selectGeneric('trait', 'beingofthestars')" src="icons/beingofthestars.png"/><img onclick="selectGeneric('trait', 'reptiliancunning')" src="icons/reptiliancunning.png"/></div></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  let compositionMode = false;

  const unitList = [
    { id: "Slann", name: "Slann Starmaster", img: "slann.png", page: "slann.html" },
    { id: "Oldblood", name: "Oldblood on Carnosaur", img: "oldblood-carno.png", page: "oldblood-carno.html" },
    { id: "Troglodon", name: "Skink Oracle on Troglodon", img: "troglodon.png", page: "troglodon.html" },
    { id: "Starpriest", name: "Skink Starpriest", img: "starpriest.png", page: "starpriest.html" },
    { id: "Skinks", name: "Skinks", img: "skinks.png", page: "skinks.html" },
    { id: "Aggradon", name: "Aggradon Lancers", img: "aggradon-lancers.png", page: "aggradon-lancers.html" },
    { id: "Chargers", name: "Raptadon Chargers", img: "raptadon-chargers.png", page: "raptadon-chargers.html" },
    { id: "Hunters", name: "Raptadon Hunters", img: "raptadon-hunters.png", page: "raptadon-hunters.html" },
    { id: "Saurus", name: "Saurus Warriors", img: "saurus-warriors.png", page: "saurus-warriors.html" },
    { id: "Saurus Guard", name: "Saurus Guard", img: "saurus-guard.png", page: "saurus-guard.html" },
    { id: "Kroxigor", name: "Kroxigor", img: "kroxigor.png", page: "kroxigor.html" },
    { id: "Kroxigor Warspawned", name: "Kroxigor Warspawned", img: "kroxigor-warspawned.png", page: "kroxigor-warspawned.html" },
    { id: "engineofgods", name: "Engine of the Gods", img: "engineofgods.png", page: "engineofgods.html" },
    { id: "bastiladon-solar", name: "Bastiladon with Solar Engine", img: "bastiladon-solar.png", page: "bastiladon-solar.html" },
    { id: "Krondspine", name: "Krondspine", img: "krondspine.png", page: "krondspine.html" },
    { id: "Realmshaper", name: "Realmshaper", img: "realmshaper.png", page: "realmshaper.html" }
  ];

  const container = document.getElementById("cardContainer");

  unitList.forEach(unit => {
    const a = document.createElement("a");
    a.href = unit.page;
    a.className = "image-button";
    a.dataset.id = unit.id;
    a.innerHTML = `<img src="boutons/${unit.img}" alt="${unit.name}">`;

    const visible = localStorage.getItem("visible-" + unit.id);
    if (visible === null) localStorage.setItem("visible-" + unit.id, "1");
    if (visible === "0") a.classList.add("hidden-card");

    a.addEventListener("click", e => {
      if (compositionMode) {
        e.preventDefault();
        const isInactive = a.classList.toggle("inactive-card");
        localStorage.setItem("visible-" + unit.id, isInactive ? "0" : "1");
      }
    });

    container.appendChild(a);
  });

  const compBtn = document.getElementById("compositionToggle");
  if (compBtn) {
    compBtn.addEventListener("click", () => {
      compositionMode = !compositionMode;
      document.querySelectorAll('.image-button').forEach(card => {
        const id = card.dataset.id;
        const visible = localStorage.getItem("visible-" + id);
        card.classList.remove("hidden-card");
        card.classList.toggle("inactive-card", compositionMode && visible === "0");
        if (!compositionMode && visible === "0") card.classList.add("hidden-card");
      });
    });
  }
});
        </script>
</body>
</html>
